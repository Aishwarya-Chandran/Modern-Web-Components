<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass Toggle Clone</title>
    <style>
        :root {
            /* Light Theme */
            --bg-light: #d6d6d6;
            --track-light: #d5d5d5;
            
            /* Dark Theme - Precise Tones */
            --bg-dark: #242424;        /* Matte dark gray bg */
            --track-dark: #404040;     /* Darker container bg */
            --glass-bright: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.2);
            --track-dark: #4b4b4b;     /* Darker container for the recessed look */
    --glass-highlight: rgba(255, 255, 255, 0.15);
            

            
            --transition: all 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-light);
            transition: var(--transition);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
        }

        body.dark-mode {
            background: radial-gradient(circle at center, #2c2c2c 0%, var(--bg-dark) 100%);
        }

        /* The Deep Carved Track */
        .toggle-container {
            position: relative;
            width: 260px;
            height: 95px;
            background-color: var(--track-light);
            border-radius: 100px;
            display: flex;
            align-items: center;
            padding: 6px;
            cursor: pointer;
            /* Neumorphic recession */
            box-shadow: inset 10px 10px 20px rgba(0,0,0,0.1), 
                        inset -5px -5px 15px rgba(255,255,255,0.7);
            transition: var(--transition);
        }

       body.dark-mode .toggle-container {
    background-color: var(--track-dark);
    box-shadow: inset 10px 10px 20px rgba(0, 0, 0, 0.6), 
                inset -2px -2px 10px rgba(255, 255, 255, 0.02); /* Soft rim light */
}

        /* Text Labels */
        .label {
            position: absolute;
            font-size: 1.8rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            transition: var(--transition);
            pointer-events: none;
        }

        .light-text { right: 50px; color: #666; opacity: 1; }
        .dark-text { left: 50px; color: #eee; opacity: 0; transform: scale(0.9); }

        body.dark-mode .light-text { opacity: 0; transform: scale(0.9); }
        body.dark-mode .dark-text { opacity: 1; transform: scale(1); }

       
        .slider {
            position: absolute;
            left: 10px;
            width: 100px;
            height: 130px;
            background: transparent !important;
            backdrop-filter: blur(20px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-radius: 45px;
            
            border: 1.5px solid var(--glass-border);
            display: flex;
            justify-content: center;
            align-items: center;
            
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2),
                        inset 0 0 10px rgba(255,255,255,0.05);
            transition: var(--transition);
            z-index: 2;
            background: rgba(255, 255, 255, 0.04); /* High transparency */
    backdrop-filter: blur(25px) saturate(200%); /* Liquid glass refraction */
    -webkit-backdrop-filter: blur(25px) saturate(200%);
    border: 1.5px solid rgba(255, 255, 255, 0.1); /* Thin specular edge */
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        /* THE HOVER EFFECT: Transparent Raindrop */
.slider:hover {
    /* 1. Change alpha to 0.00 for total transparency */
    background: rgba(255, 255, 255, 0.0); 
    
    /* 2. Increase the rim brightness */
    border: 1px solid rgba(255, 255, 255, 0.45); 
    
    /* 3. Add a stronger inset glow to simulate light hitting water edges */
    box-shadow: 
        0 25px 50px rgba(0, 0, 0, 0.4), 
        inset 0 0 20px rgba(255, 255, 255, 0.25); 
        
    transform: scale(1.04);
    cursor: pointer;
}

        body.dark-mode .slider {
            transform: translateX(130px);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
        }

        /* SVG Icons */
        svg {
            width: 42px;
            height: 42px;
            fill: white;
            transition: var(--transition);
        }

        .sun { filter: drop-shadow(0 0 8px rgba(255,255,255,0.4)); }
        .moon { 
            display: none; 
            transform: rotate(-15deg); 
            filter: drop-shadow(0 0 12px rgba(255,255,255,0.5));
        }

        body.dark-mode .sun { display: none; }
        body.dark-mode .moon { display: block; }

    </style>
</head>
<body>

    <div class="toggle-container" id="toggle">
        <div class="label dark-text">Dark</div>
        <div class="label light-text">Light</div>
        
        <div class="slider">
            <svg class="sun" viewBox="0 0 24 24">
                <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 00-1.41 0 .996.996 0 000 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 000-1.41l-1.06-1.06zm1.06-12.37a.996.996 0 00-1.41 0l-1.06 1.06a.996.996 0 101.41 1.41l1.06-1.06a.996.996 0 000-1.41zM7.05 18.36a.996.996 0 00-1.41 0l-1.06 1.06a.996.996 0 101.41 1.41l1.06-1.06a.996.996 0 000-1.41z"></path>
            </svg>
            <svg class="moon" viewBox="0 0 24 24">
                <path d="M18.8,14.9c-0.8,3.5-3.9,6.1-7.6,6.1c-4.3,0-7.8-3.5-7.8-7.8c0-3.3,2.1-6.2,5.1-7.3
                c-1,1.3-1.6,2.9-1.6,4.7c0,4.1,3.3,7.5,7.5,7.5C15.9,18.1,17.4,16.8,18.8,14.9z"/>
            </svg>
        </div>
    </div>

    <script>
        const toggle = document.getElementById('toggle');
        toggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
        });
    </script>
</body>
</html>
