<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glassmorphism Sidebar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>
<div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
<div class="grid-lines"></div>

<div class="overlay" id="overlay"></div>

<button class="hamburger" id="hamburger" aria-label="Toggle menu">
  <span></span><span></span><span></span>
</button>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-glow"></div>

  <div class="back-row">
    <div class="back-btn" id="closeBtn" title="Close sidebar">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
    </div>
  </div>

  <div class="search-wrap">
    <svg class="search-icon-left" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
    </svg>
    <input class="search-input" id="searchInput" type="text" placeholder="Search menu…" autocomplete="off">
  </div>

  <div class="search-results" id="searchResults"></div>

  <div id="navContent">
    <div class="section-label">Main</div>
    <nav class="nav">
      <div class="nav-item active" data-page="Dashboard">
        <div class="nav-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" class="ic-cyan"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></div>
        <span class="nav-label">Dashboard</span><span class="badge-dot"></span>
      </div>
      <div class="nav-item" data-page="Analytics">
        <div class="nav-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" class="ic-purple"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
        <span class="nav-label">Analytics</span><span class="nav-badge badge-cyan">Live</span>
      </div>
      <div class="nav-item" data-page="Projects">
        <div class="nav-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" class="ic-blue"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
        <span class="nav-label">Projects</span><span class="nav-badge badge-purple">12</span>
      </div>
      <div class="nav-item" data-page="Messages">
        <div class="nav-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" class="ic-pink"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>
        <span class="nav-label">Messages</span><span class="nav-badge badge-pink">9</span>
      </div>
      <div class="nav-item" data-page="Calendar">
        <div class="nav-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" class="ic-green"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
        <span class="nav-label">Calendar</span>
      </div>
      <div class="nav-item" data-page="Tasks">
        <div class="nav-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" class="ic-yellow"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>
        <span class="nav-label">Tasks</span><span class="nav-badge badge-cyan">3</span>
      </div>
    </nav>

    <div class="divider"></div>
    <div class="section-label">Account</div>
    <nav class="nav">
      <div class="nav-item" data-page="Notifications">
        <div class="nav-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" class="ic-yellow"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg></div>
        <span class="nav-label">Notifications</span><span class="nav-badge badge-pink">4</span>
      </div>
      <div class="nav-item" data-page="Settings">
        <div class="nav-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" class="ic-muted"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></div>
        <span class="nav-label">Settings</span>
      </div>
      <div class="nav-item" data-page="Help">
        <div class="nav-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" class="ic-muted"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
        <span class="nav-label">Help</span>
      </div>
    </nav>
  </div>

  <div class="spacer"></div>

  <div class="user-card">
    <div class="avatar">AC</div>
    <div class="user-info">
      <div class="user-name">Aishwarya Chandran</div>
      <div class="user-meta">
        <span class="user-role">Designer</span>
        <span style="color:rgba(255,255,255,0.15);font-size:10px">·</span>
        <div class="status-pill"><div class="status-dot"></div>Online</div>
      </div>
    </div>
  </div>
</aside>

<main class="main">
  <div class="hero"></div>
</main>

<script src="script.js?v=2"></script>
</body>
</html>
